name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 3.88.141.65
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/devops-app || git clone git@github.com:YOUR-USERNAME/devops-app.git
            cd devops-app
            git pull
            docker build -t devops-app .
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d -p 80:3000 --name devops-app devops-app
